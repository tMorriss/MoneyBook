# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: ci

on: [pull_request]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.11
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements_dev.txt
      - name: Lint with tox
        run: |
          tox -e lint
  check-init-py:
    name: check __init__.py
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v2
      - name: Validate __init__.py
        run: |
          chmod +x check_init_py.sh
          ./check_init_py.sh
  check-e2e-matrix:
    name: check e2e matrix configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Validate e2e Matrix
        run: |
          chmod +x check_e2e_matrix.sh
          ./check_e2e_matrix.sh
      - name: Validate playwright Matrix
        run: |
          chmod +x check_playwright_matrix.sh
          ./check_playwright_matrix.sh
  unittest:
    name: unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.11
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements_dev.txt
      - name: Test with tox
        run: |
          tox -e unittest
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  e2e:
    name: e2e-${{ matrix.test-module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-module:
          [
            index,
            add,
            delete,
            period_balances,
            periodic,
            search,
            tools,
          ]
    env:
      TEST_MODULE: moneybook.e2e.${{ matrix.test-module }}
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.11
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"
      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements_dev.txt
      - name: Test with tox
        run: |
          tox -e e2e

  playwright:
    name: playwright-${{ matrix.test-module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-module:
          [
            edit,
            login,
          ]
    env:
      TEST_MODULE: moneybook.playwright.${{ matrix.test-module }}
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.11
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements_dev.txt
      - name: Test with tox
        run: |
          tox -e playwright
