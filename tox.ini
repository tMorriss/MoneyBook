[tox]
envlist = lint,unittest,e2e
skipsdist = True

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
    DJANGO_SETTINGS_MODULE = config.settings.test

[testenv:lint]
deps = -r{toxinidir}/requirements/requirements_lint.txt
commands =
    flake8 . --count --exclude moneybook/migrations,__init__.py,.tox,.venv --show-source --statistics --import-order-style smarkets
    python check_filenames.py

[testenv:unittest]
deps =
    -r{toxinidir}/requirements/requirements.txt
    -r{toxinidir}/requirements/requirements_test.txt
commands =
    coverage run --source='moneybook.models,moneybook.views,moneybook.utils,moneybook.middleware,moneybook.forms' manage.py test moneybook.tests
    coverage report -m
    coverage xml

[testenv:e2e]
deps =
    -r{toxinidir}/requirements/requirements.txt
    -r{toxinidir}/requirements/requirements_e2e.txt
passenv =
    HEADLESS
    TEST_MODULE
    DB_NAME
    DB_USER
    DB_PASS
    DB_HOST
    DB_PORT
commands =
    playwright install --with-deps chromium
    python manage.py test {env:TEST_MODULE:moneybook.e2e} --settings config.settings.e2e

[flake8]
max-line-length = 140
ignore = E722,W503
inline-quotes = single
