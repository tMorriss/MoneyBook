[tox]
envlist = lint,unittest,e2e
skipsdist = True

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
    DJANGO_SETTINGS_MODULE = config.settings.test

[testenv:lint]
deps = -r{toxinidir}/requirements/requirements_lint.txt
commands =
    flake8 . --count --exclude moneybook/migrations,__init__.py,.tox --show-source --statistics --import-order-style smarkets
    python -c "import os, re, sys; errors = [os.path.join(root, f) for root, dirs, files in os.walk('moneybook') if 'migrations' not in root and '.tox' not in root and '__pycache__' not in root for f in files if f.endswith('.py') and f != '__init__.py' and not re.match(r'^[a-z0-9_]+\.py$', f)]; [print(f'Error: Filename {e} is not in snake_case') for e in errors]; sys.exit(1 if errors else 0)"

[testenv:unittest]
deps =
    -r{toxinidir}/requirements/requirements.txt
    -r{toxinidir}/requirements/requirements_test.txt
commands =
    coverage run --source='moneybook.models,moneybook.views,moneybook.utils,moneybook.middleware,moneybook.forms' manage.py test moneybook.tests
    coverage report -m
    coverage xml

[testenv:e2e]
deps =
    -r{toxinidir}/requirements/requirements.txt
    -r{toxinidir}/requirements/requirements_e2e.txt
passenv = 
    HEADLESS
    TEST_MODULE
commands =
    python manage.py test {env:TEST_MODULE:moneybook.e2e} --settings config.settings.test

[flake8]
max-line-length = 140
ignore = E722,W503
inline-quotes = single
